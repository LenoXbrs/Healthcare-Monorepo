apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-usuarios
  labels:
    app: api-usuarios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-usuarios
  template:
    metadata:
      labels:
        app: api-usuarios
    spec:
      containers:
        - name: api-usuarios
          image: ghcr.io/SEU_USUARIO/api-usuarios:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
