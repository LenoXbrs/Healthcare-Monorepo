spring:
  application:
    name: healthcare-gateway
  cloud:
    gateway:
      mvc:
        forwarded-request-headers-filter:
          enabled: false
        x-forwarded-request-headers-filter:
          enabled: false
        routes:
            - id: rota-pacientes
              uri: ${PACIENTES_URL:http://localhost:8081}
              predicates:
                - Path=/pacientes, /pacientes/**

            - id: rota-usuarios
              uri: ${USUARIOS_URL:http://localhost:8082}
              predicates:
                - Path=/usuarios, /usuarios/**

            - id: rota-notificacoes
              uri: ${USUARIOS_URL:http://localhost:8082}
              predicates:
                - Path=/notificacoes, /notificacoes/**

            - id: rota-triagem
              uri: ${TRIAGEM_URL:http://localhost:8083}
              predicates:
                - Path=/triagem, /triagem/**

            - id: rota-diagnosticos
              uri: ${TRIAGEM_URL:http://localhost:8083}
              predicates:
                - Path=/diagnosticos, /diagnosticos/**


server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}


