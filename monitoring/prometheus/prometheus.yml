global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Apps no host (Windows/Mac: host.docker.internal) ───────────────────────
  - job_name: healthcare-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: healthcare-gateway
          service: gateway

  - job_name: healthcare-pacientes
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: healthcare-api-pacientes
          service: pacientes

  - job_name: healthcare-usuarios
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          application: healthcare-api-usuarios
          service: usuarios

  - job_name: healthcare-triagem
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          application: healthcare-api-triagem
          service: triagem

  # ── Prometheus self-monitor ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

