# Prometheus + Grafana — Healthcare
#
# Apps rodando no host (IDE / mvn spring-boot:run):
#   docker compose -f monitoring/docker-compose.yml up -d
#
# Apps na mesma rede Docker (hostnames api-*):
#   descomente o bloco "targets-docker" em prometheus/prometheus.yml

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: healthcare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - healthcare-monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: healthcare-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - healthcare-monitoring
    restart: unless-stopped

networks:
  healthcare-monitoring:
    name: healthcare-monitoring
    driver: bridge
